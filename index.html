<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBridge P2P</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #8b5cf6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2rem; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .status-badge { padding: 6px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; display: inline-block; margin-bottom: 20px; }
        .connected { background: #10b981; }
        .drop-zone { border: 2px dashed #475569; padding: 40px; border-radius: 16px; cursor: pointer; margin: 20px 0; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>AirBridge</h1>
        <div id="status" class="status-badge">Disconnected</div>
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            <p>Click to select file</p>
            <input type="file" id="fileInput" style="display:none">
        </div>
        <div id="logArea"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script>
        const socket = io("https://airbridge-signaling.onrender.com");
        const peer = new SimplePeer({ 
            initiator: location.hash === '#1', 
            trickle: false,
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('signal', data => socket.emit('signal', data));
        socket.on('signal', data => peer.signal(data));

        peer.on('connect', () => {
            document.getElementById('status').className = 'status-badge connected';
            document.getElementById('status').innerText = 'Connected';
        });

        // Receiving logic
        peer.on('data', data => {
            const message = JSON.parse(data);
            const btn = document.createElement('button');
            btn.innerText = "Download " + message.name;
            btn.onclick = () => {
                const link = document.createElement('a');
                link.href = message.data; // The base64 data
                link.download = message.name;
                link.click();
            };
            document.querySelector('.card').appendChild(btn);
        });

        // Sending logic
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const payload = JSON.stringify({
                    name: file.name,
                    data: event.target.result // Base64 data
                });
                peer.send(payload);
                document.getElementById('logArea').innerText = "Sent: " + file.name;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
