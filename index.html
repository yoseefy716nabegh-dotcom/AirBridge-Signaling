<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBridge P2P</title>
    <style>
        body { background: #0a0a0c; color: #e2e8f0; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background: #15151a; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        #status { padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        .connected { background: #065f46; }
        .disconnected { background: #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <h2>AirBridge</h2>
        <div id="status" class="disconnected">Waiting for Peer...</div>
        <input type="file" id="fileInput">
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script>
        // REPLACE THIS URL with your Render URL (e.g., https://airbridge-signaling.onrender.com)
        const socket = io("https://airbridge-signaling.onrender.com"); 

        const peer = new SimplePeer({ 
            initiator: location.hash === '#1', 
            trickle: false,
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('signal', data => socket.emit('signal', data));
        socket.on('signal', data => peer.signal(data));

        peer.on('connect', () => {
            const s = document.getElementById('status');
            s.className = 'connected'; s.innerText = 'Connected: Ready to Transfer';
        });
    </script>
</body>
</html>
