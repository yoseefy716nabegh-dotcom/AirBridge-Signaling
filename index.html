<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBridge P2P</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #8b5cf6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2rem; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .status-badge { padding: 6px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; display: inline-block; margin-bottom: 20px; background: #ef4444; }
        .connected { background: #10b981; }
        .drop-zone { border: 2px dashed #475569; padding: 40px; border-radius: 16px; cursor: pointer; margin: 20px 0; transition: border 0.3s; }
        .drop-zone.dragover { border-color: var(--accent); background: #2d3748; }
        #downloadBtn { display: none; background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; width: 100%; }
        #logArea { font-size: 0.9rem; color: #94a3b8; margin-top: 10px; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="card">
        <h1>AirBridge</h1>
        <div id="status" class="status-badge">Disconnected</div>
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <p>Drag & drop or Click</p>
            <input type="file" id="fileInput" style="display:none">
        </div>
        <div id="logArea"></div>
        <button id="downloadBtn">Download File</button>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script>
        const socket = io("https://airbridge-signaling.onrender.com");
        const peer = new SimplePeer({ initiator: location.hash === '#1', trickle: false });
        const dropZone = document.getElementById('dropZone');
        
        peer.on('signal', data => socket.emit('signal', data));
        socket.on('signal', data => peer.signal(data));

        peer.on('connect', () => {
            const status = document.getElementById('status');
            status.className = 'status-badge connected';
            status.innerText = 'Connected';
        });

        // Drag and Drop Logic
        ['dragover', 'dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                if (evt === 'dragover') dropZone.classList.add('dragover');
                else dropZone.classList.remove('dragover');
            });
        });

        dropZone.addEventListener('drop', e => {
            handleFile(e.dataTransfer.files[0]);
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file) return;
            const encoder = new TextEncoder();
            peer.send(encoder.encode(JSON.stringify({ type: 'start', name: file.name })));
            let offset = 0;
            const reader = new FileReader();
            const sendNext = () => reader.readAsArrayBuffer(file.slice(offset, offset + 16384));

            reader.onload = (e) => {
                peer.send(e.target.result);
                offset += e.target.result.byteLength;
                document.getElementById('logArea').innerText = `Sending: ${Math.round((offset/file.size)*100)}%`;
                if (offset < file.size) setTimeout(sendNext, 40);
                else setTimeout(() => peer.send(encoder.encode(JSON.stringify({ type: 'end' }))), 500);
            };
            sendNext();
        }

        let receivedChunks = [];
        let fileName = "";

        peer.on('data', data => {
            if (data[0] === 123) {
                const msg = JSON.parse(new TextDecoder().decode(data));
                if (msg.type === 'start') {
                    receivedChunks = []; fileName = msg.name;
                    document.getElementById('logArea').innerText = "Receiving: " + fileName;
                } else if (msg.type === 'end') {
                    document.getElementById('logArea').innerText = "Transfer Complete!";
                    const btn = document.getElementById('downloadBtn');
                    btn.style.display = "block";
                    btn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(new Blob(receivedChunks));
                        a.download = fileName;
                        a.click();
                    };
                }
            } else {
                receivedChunks.push(data);
                document.getElementById('logArea').innerText = "Progress: " + receivedChunks.length + " chunks";
            }
        });
    </script>
</body>
</html>
